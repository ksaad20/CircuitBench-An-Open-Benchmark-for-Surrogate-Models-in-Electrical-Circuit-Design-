name: CircuitBench CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Ruff Linter (Auto-fix & Non-blocking)
        run: ruff check src tests --fix --unsafe-fixes --exit-zero

      - name: Run Ruff Format
        run: ruff format src tests

      - name: Commit fixes (if any)
        if: always()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff-index --quiet HEAD || git commit -m "style: apply automated ruff fixes"
          git push || echo "No changes to push or unable to push automatically."

      - name: Run Pytest
        run: pytest
        
