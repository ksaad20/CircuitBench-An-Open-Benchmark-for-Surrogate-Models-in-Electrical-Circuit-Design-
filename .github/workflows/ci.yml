name: CircuitBench CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install CircuitBench
        run: |
          pip install -e .

      - name: Install CI dependencies
        run: |
          pip install \
            typer \
            numpy \
            pandas \
            scipy \
            matplotlib \
            scikit-learn \
            pytest \
            pytest-cov \
            black \
            ruff \
            flake8

      - name: Black formatting check
        run: black --check src tests

      - name: Ruff lint
        run: ruff check src tests --fix --unsafe-fixes

      - name: Flake8 lint
        run: flake8 src tests

      - name: Run tests
        env:
          PYTHONPATH: src
        run: python -m pytest -v

      - name: Generate coverage
        env:
          PYTHONPATH: src
        run: |
          python -m pytest \
            --cov=src \
            --cov-report=xml \
            --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml
