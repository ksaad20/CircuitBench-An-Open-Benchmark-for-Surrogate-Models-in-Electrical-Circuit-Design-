name: CircuitBench CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  auto-fix:
    name: auto-fix
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          pip install ruff black
      - run: black .
      - run: ruff check --fix --exit-zero .
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || (git commit -m "style: auto-fixes from CI" && git push)

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: auto-fix
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          pip install ruff black
      - run: black --check --diff . || true
      - run: ruff check --output-format=github --exit-zero .

  test:
    name: test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: auto-fix
    if: always()
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f pyproject.toml ] || [ -f setup.py ] || [ -f setup.cfg ]; then pip install -e .; fi
      - run: pytest tests/ -v --tb=short || pytest -v --tb=short || echo "No tests collected"
        continue-on-error: true

  build:
    name: build & security
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          pip install build twine check-wheel-contents bandit
      - run: python -m build
      - run: check-wheel-contents dist/*.whl || true
      - run: twine check dist/* || true
      - run: bandit -r . -ll || true
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: dist/
