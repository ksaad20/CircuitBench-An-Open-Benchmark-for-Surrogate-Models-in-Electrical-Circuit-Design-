
target-version = "py310"
line-length = 100

[lint]
select = ["E", "F", "I", "W", "UP", "B", "C4", "SIM"]
ignore = [
    "BLE001",
    "B905",
    "PLW1510",
    "S101",
    "ANN",
    "UP007",
    "SIM108",
]

[lint.per-file-ignores]
"tests/**" = ["BLE001", "PLW1510", "S101", "ANN", "UP007", "SIM108"]
"test_*.py" = ["BLE001", "PLW1510", "S101", "ANN", "UP007", "SIM108"]
